# ================================================
# BurgerApp v2 — Docker Compose
# Orquestra os 4 serviços (Microsserviços + Dashboard)
# ================================================

services:

  dashboard:
    build:
      context: ./dashboard-service
    container_name: burger-dashboard
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    depends_on:
      - order-service
      - payment-service
      - notification-service
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: burger-order-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: burger-payment-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: burger-notification-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
