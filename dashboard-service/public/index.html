<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurgerApp v2 - Dashboard Unificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .step-inactive { opacity: 0.5; pointer-events: none; }
        .notification-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-red-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fas fa-hamburger mr-2"></i> BurgerApp v2</h1>
            <div id="connection-status" class="text-sm bg-red-700 px-3 py-1 rounded-full">
                Status: <span id="status-text">Verificando...</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- COLUNA 1: CARDÁPIO E PEDIDO -->
        <section class="lg:col-span-2 space-y-8">
            <div id="step-1" class="bg-white rounded-xl shadow-md p-6 border-t-4 border-red-500">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center mr-3">1</span>
                    Monte seu Burger
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Escolha o Hambúrguer:</label>
                        <select id="select-burger" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                            <option value="classico">Clássico (R$ 18,00)</option>
                            <option value="duplo">Duplo (R$ 28,00)</option>
                            <option value="vegano">Vegano (R$ 22,00)</option>
                            <option value="frango">Frango Crispy (R$ 20,00)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Adicionais:</label>
                        <div class="space-y-2 bg-gray-50 p-3 rounded-lg border">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="adicional" value="bacon" class="w-4 h-4 text-red-600">
                                <span>Bacon (+ R$ 4,00)</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="adicional" value="cheddar" class="w-4 h-4 text-red-600">
                                <span>Queijo Extra (+ R$ 3,00)</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" name="adicional" value="batata" class="w-4 h-4 text-red-600">
                                <span>Batata Frita (+ R$ 8,00)</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-gray-700 font-semibold mb-2">Observação:</label>
                    <textarea id="obs-pedido" placeholder="Ex: Sem cebola, ponto da carne mal passado..." class="w-full p-3 border rounded-lg h-20 outline-none focus:ring-2 focus:ring-red-500"></textarea>
                </div>

                <button id="btn-criar-pedido" class="mt-6 w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition duration-200 flex items-center justify-center">
                    <i class="fas fa-check-circle mr-2"></i> Confirmar Pedido
                </button>
            </div>

            <!-- PASSO 2: PAGAMENTO -->
            <div id="step-2" class="bg-white rounded-xl shadow-md p-6 border-t-4 border-blue-500 step-inactive">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="bg-blue-500 text-white w-8 h-8 rounded-full flex items-center justify-center mr-3">2</span>
                    Pagamento
                </h2>
                
                <div id="order-summary" class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-100">
                    <p class="text-blue-800">Pedido: <span id="summary-id" class="font-mono font-bold">#---</span></p>
                    <p class="text-2xl font-black text-blue-900 mt-1">Total: R$ <span id="summary-total">0,00</span></p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="selecionarMetodo('pix')" class="metodo-pg p-4 border-2 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition text-center group" data-metodo="pix">
                        <i class="fas fa-qrcode text-2xl text-gray-400 group-hover:text-blue-500 mb-2"></i>
                        <p class="text-sm font-bold">PIX</p>
                    </button>
                    <button onclick="selecionarMetodo('credito')" class="metodo-pg p-4 border-2 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition text-center group" data-metodo="credito">
                        <i class="fas fa-credit-card text-2xl text-gray-400 group-hover:text-blue-500 mb-2"></i>
                        <p class="text-sm font-bold">Crédito</p>
                    </button>
                    <button onclick="selecionarMetodo('debito')" class="metodo-pg p-4 border-2 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition text-center group" data-metodo="debito">
                        <i class="fas fa-credit-card text-2xl text-gray-400 group-hover:text-blue-500 mb-2"></i>
                        <p class="text-sm font-bold">Débito</p>
                    </button>
                    <button onclick="selecionarMetodo('dinheiro')" class="metodo-pg p-4 border-2 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition text-center group" data-metodo="dinheiro">
                        <i class="fas fa-money-bill-wave text-2xl text-gray-400 group-hover:text-blue-500 mb-2"></i>
                        <p class="text-sm font-bold">Dinheiro</p>
                    </button>
                </div>

                <button id="btn-pagar" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 hidden">
                    Pagar Agora
                </button>
            </div>
        </section>

        <!-- COLUNA 2: NOTIFICAÇÕES (FEED) -->
        <section class="lg:col-span-1">
            <div class="bg-gray-800 text-white rounded-xl shadow-xl p-6 h-[calc(100vh-160px)] sticky top-8 flex flex-col">
                <h2 class="text-xl font-bold mb-4 flex items-center border-b border-gray-700 pb-3">
                    <i class="fas fa-bell text-yellow-400 mr-2"></i> Central de Notificações
                </h2>
                
                <div id="notifications-feed" class="flex-grow overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                    <!-- Notificações aparecem aqui -->
                    <div class="text-gray-500 text-center py-10">
                        <i class="fas fa-clock text-4xl mb-3 block"></i>
                        <p>Aguardando pedidos...</p>
                    </div>
                </div>

                <div class="mt-4 pt-4 border-t border-gray-700 text-xs text-gray-400 flex justify-between">
                    <span>Logs em tempo real</span>
                    <button id="btn-limpar-notif" class="hover:text-white">Limpar</button>
                </div>
            </div>
        </section>
    </main>

    <!-- LOADING OVERLAY -->
    <div id="loading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-5 rounded-lg flex items-center space-x-3 shadow-2xl">
            <div class="animate-spin rounded-full h-8 w-8 border-b-4 border-red-600"></div>
            <span class="font-bold text-gray-700">Processando...</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
